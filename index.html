<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>[nombre aqui] // Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font Mono -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">


</head>
<body>

<nav>
    <div class="nav-profile">
        <img src="avatar.jpg" alt="avatar">
        <div>
            <div class="nav-name">[nombre aqui]</div>
            <div class="nav-role">[rol aqui]</div>
        </div>
    </div>

    <div class="nav-links">
        <a href="#about">#about</a>
        <a href="#tech">#tech</a>
        <a href="#projects">#projects</a>
    </div>
</nav>

<section class="hero">
    <div class="hero-text">
        <h1 class="typing">[nombre aqui]</h1>
        <p class="subtitle">[rol aqui]</p>
    </div>

    <div class="hero-avatar">
        <img src="avatar.jpg" alt="avatar">
    </div>
</section>

<section id="about" class="section">
    <h2>about</h2>
    <p>
        [breve descripcion aqui]
    </p>
</section>

<section id="tech" class="section">
    <h2>tech</h2>
    <div class="tech-icons">
        <i class="devicon-git-plain"></i>
        <i class="devicon-github-original"></i>
        <i class="devicon-python-plain"></i>
        <i class="devicon-java-plain"></i>
        <i class="devicon-spring-plain"></i>
        <i class="devicon-mysql-plain"></i>
        <i class="devicon-postgresql-plain"></i>
        <i class="devicon-docker-plain"></i>
        <i class="devicon-linux-plain"></i>
        <i class="devicon-windows8-plain"></i>
        <i class="devicon-bash-plain"></i>
        <i class="devicon-vscode-plain"></i>
        <i class="devicon-intellij-plain"></i>
        <i class="devicon-bootstrap-plain"></i>
        <i class="devicon-markdown-original"></i>
        <i class="devicon-latex-plain"></i>
        <i class="devicon-postman-plain"></i>
        <i class="devicon-octave-plain"></i>
    </div>
</section>

<section id="projects" class="section">
    <h2>projects</h2>

    <div class="project">
        <h3>[proyecto 1]</h3>
        <p>[descripcion proyecto]</p>
        <span class="stack">[tech stack]</span>
    </div>

    <div class="project">
        <h3>[proyecto 2]</h3>
        <p>[descripcion proyecto]</p>
        <span class="stack">[tech stack]</span>
    </div>

    <div class="project">
        <h3>[proyecto 3]</h3>
        <p>[descripcion proyecto]</p>
        <span class="stack">[tech stack]</span>
    </div>

</section>


<section id="contact" class="section">
    <h2>connect</h2>
    <div class="contact-icons">
        <a href="[link linkedin]" target="_blank">
            <i class="devicon-linkedin-plain"></i>
        </a>
        <a href="[link github]" target="_blank">
            <i class="devicon-github-original"></i>
        </a>
    </div>
</section>

<script>
const elements = document.querySelectorAll('.section');

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('visible');
        }
    });
}, { threshold: 0.2 });

elements.forEach(el => {
    el.classList.add('fade-in');
    observer.observe(el);
});
</script>

</body>
</html>
